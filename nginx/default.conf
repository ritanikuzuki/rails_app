server {
    listen 80;
    server_name escape-penalty.com;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name escape-penalty.com;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/escape-penalty.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/escape-penalty.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Proxy requests to Rails (using variable to postpone DNS resolution)
    location / {
        set $upstream_app web;
        proxy_pass http://$upstream_app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files directly if needed
    location /assets/ {
        root /app/public;
        gzip_static on;
        expires max;
        add_header Cache-Control public;
    }
}
